# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://help.github.com/actions/language-and-framework-guides/publishing-nodejs-packages

name: Node.js Package publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Build typescript packages
        run: npm run buildts

      - name: Publish to npm
        run: npx lerna publish from-git --yes
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Set Docker Version Tag
        needs: [publish-packages] 
        id: set-version
        run: |
          VERSION_TAG=""
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            # Extract clean version number (e.g., v1.2.3 -> 1.2.3)
            CLEAN_VER=$(echo "${{ github.ref_name }}" | sed 's/.*-v//')
            VERSION_TAG="$CLEAN_VER"
          else
            # fail
            exit 0
          fi
          echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        needs: [publish-packages] 
        uses: docker/setup-buildx-action@v4

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        needs: [publish-packages] 
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/staticserver
          labels: |
            org.opencontainers.image.title=staticserver
            org.opencontainers.image.description=Component staticserver from the fancy-lectures monorepo
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern=v{{version}},value=${{ env.VERSION_TAG }}
            type=semver,pattern=v{{major}}.{{minor}},value=${{ env.VERSION_TAG }}
            type=semver,pattern=v{{major}},value=${{ env.VERSION_TAG }}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        needs: [publish-packages] 
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./daemons/staticserver/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
