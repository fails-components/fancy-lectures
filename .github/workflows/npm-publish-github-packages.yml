# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://help.github.com/actions/language-and-framework-guides/publishing-nodejs-packages

name: Node.js Package publish

on:
  push:
    branches:
      - 'master'
      - 'next'

  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'     
        required: true
        default: 'warning'
      tags:
        description: 'Testing node.js package publish workflow'
jobs:
  publish-gpr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false 
      matrix:
        include:
          - name: 'lectureapp'
            path: 'packages/lectureapp'
          - name: 'app'
            path: 'packages/app'
          - name: 'assets'
            path: 'packages/assets'
          - name: 'avkeystore'
            path: 'packages/avkeystore'
          - name: 'commonhandler'
            path: 'packages/commonhandler'
          - name: 'config'
            path: 'packages/config'
          - name: 'data'
            path: 'packages/data'
          - name: 'security'
            path: 'packages/security'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com/
      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.path }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Check if version has been updated
        id: check
        uses: EndBug/version-check@v2
        with: 
          diff-search: true
          file-url: ${{ matrix.path }}/package.json
      - name: Log when changed
        if: steps.check.outputs.changed == 'true'
        run: 'echo "Version change found in ${{ matrix.name }}! New version: ${{ steps.check.outputs.version }} (${{ steps.check.outputs.type }})"'
      - name: Log when unchanged
        if: steps.check.outputs.changed == 'false'
        run: 'echo "No version change for ${{ matrix.name }} :/"'      
# no tests declared
#      - run: npm test
#        env:
#          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish Stable (Master)
        if: steps.check.outputs.changed == 'true' && github.ref == 'refs/heads/master'
        run: |
          npm publish --tag stable
          npm dist-tag add @fails-components/${{ matrix.name }}@${{ steps.check.outputs.version }} latest
        working-directory: ${{ matrix.path }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Next (Next branch)
        if: steps.check.outputs.changed == 'true' && github.ref == 'refs/heads/next'
        run: |
          npm publish --tag next
          npm dist-tag add @fails-components/${{ matrix.name }}@${{ steps.check.outputs.version }} latestunstable
        working-directory: ${{ matrix.path }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
